<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Alterna navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse " id="navbarNav">
            <a class="navbar-brand" href="#">Meu Site</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="calculadora.html">Calculadora</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contato.html">Contato</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                Calculadora
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label>Número 1</label>
                    <input type="number" id="n1" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Número 2</label>
                    <input type="number" id="n2" class="form-control">
                </div>
                <label>Operação:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="operacao" value="soma">
                    <label class="form-check-label">Soma</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="operacao" value="sub">
                    <label class="form-check-label">Subtração</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="operacao" value="mult">
                    <label class="form-check-label">Multiplicação</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="operacao" value="div">
                    <label class="form-check-label">Divisão</label>
                </div>
                <button id="calcular" class="btn btn-success mt-3">
                    Calcular
                </button>
                <button id="limpar" class="btn btn-warning mt-3" onclick="limpar()">
                    Limpar
                </button>
                <div class="alert alert-info mt-3" id="resultado">
                    Resultado aparecerá aqui
                </div>
            </div>
        </div>
    </div>


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>

    <script src="js/calculadora.js"></script>
</body>

</html>
